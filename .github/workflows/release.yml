name: Release

on:
  push:
    tags:
      - 'v*'

# Principio de mínimo privilegio: solo write en contents para crear el release.
# Todos los demás scopes quedan denegados por defecto.
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # glibc 2.35 — cubre Debian 12, Ubuntu 22.04+ y la mayoría de distros modernas

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      # Pinado por hash inmutable, no por tag (los tags pueden ser reasignados).
      # Hash corresponde a actions/checkout v4.2.2 — verificar en:
      # https://github.com/actions/checkout/commits/main
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # ── Rust ─────────────────────────────────────────────────────────────────
      # Usamos rustup directamente (pre-instalado en el runner) en lugar de
      # una acción de terceros como dtolnay/rust-toolchain para evitar
      # dependencia en código externo.
      - name: Update Rust to stable
        run: |
          rustup update stable
          rustup default stable
          rustup show

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      # corepack viene con Node.js (pre-instalado en el runner) — sin acciones externas.
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      # ── Dependencias del sistema para Tauri v2 en Linux ─────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # ── Dependencias del proyecto ────────────────────────────────────────────
      - name: Install Node dependencies
        run: pnpm install

      # ── Versión desde el tag ─────────────────────────────────────────────────
      # Extrae la versión del tag (v1.2.3 → 1.2.3) y la escribe en Cargo.toml.
      # tauri.conf.json no tiene version, así que Tauri la lee de Cargo.toml.
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = .*/s/^version = .*/version = \"$VERSION\"/" \
            apps/desktop/src-tauri/Cargo.toml
          echo "Building version $VERSION"

      # ── Build ────────────────────────────────────────────────────────────────
      # Genera .deb (para Debian/Ubuntu) y AppImage (universal).
      # El AppImage compilado en ubuntu-22.04 (glibc 2.35) corre en cualquier
      # distro con glibc >= 2.35, incluyendo Debian 12 y 13.
      - name: Build Tauri — Linux
        run: pnpm --filter @lumik/desktop tauri build -- --bundles deb,appimage

      # ── Crear release en GitHub ──────────────────────────────────────────────
      # Usamos la CLI `gh` (pre-instalada en todos los runners de GitHub) en lugar
      # de softprops/action-gh-release u otras acciones de terceros.
      # GITHUB_TOKEN es el token efímero generado por GitHub para este job —
      # no es un secret manual y expira al terminar el workflow.
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Lumik ${{ github.ref_name }}" \
            --generate-notes \
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb \
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
