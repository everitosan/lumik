name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Crea el release vacío primero ──────────────────────────────────────────
  # Los jobs de build corren en paralelo y suben sus artefactos a este release.
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[.*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- Notas extraídas -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Lumik ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  # ── Build Linux ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04  # glibc 2.35 — cubre Debian 12, Ubuntu 22.04+ y la mayoría de distros modernas
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Update Rust to stable
        run: |
          rustup update stable
          rustup default stable
          rustup show

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install Node dependencies
        run: pnpm install

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = .*/s/^version = .*/version = \"$VERSION\"/" \
            apps/desktop/src-tauri/Cargo.toml
          echo "Building version $VERSION"

      - name: Build Tauri — Linux
        run: pnpm --filter @lumik/desktop tauri build --bundles deb,appimage

      - name: Upload Linux artifacts to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb \
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  # ── Build Windows ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Update Rust to stable
        run: |
          rustup update stable
          rustup default stable
          rustup show

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Node dependencies
        run: pnpm install

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $cargoToml = "apps/desktop/src-tauri/Cargo.toml"
          $content = Get-Content $cargoToml -Raw
          $content = $content -replace '(?m)^version = .*', "version = `"$version`""
          Set-Content $cargoToml -Value $content -Encoding utf8 -NoNewline
          Write-Output "Building version $version"

      - name: Build Tauri — Windows
        run: pnpm --filter @lumik/desktop tauri build --config src-tauri/tauri.windows.conf.json

      - name: Upload Windows installer to release
        shell: pwsh
        run: |
          $exe = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          gh release upload "${{ github.ref_name }}" $exe.FullName
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
